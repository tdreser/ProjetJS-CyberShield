<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CyberShield</title>
  <link rel="stylesheet" href="../style.css">
  </head>
  <body>
      <section class="topbar">
          <a class="topbar-button" href="../index.html">Dashboard</a>
          <a class="topbar-button" href="./password.html">Analyseur mdp</a>
          <a class="selected-topbar-button">Détecteur phishing</a>
          <a class="topbar-button" href="./cipher.html">Cryptographie messages</a>
          <a class="topbar-button" href="./quiz.html">Quiz interactif</a>
      </section>
      <h1>Détecteur d'e-mails phishing</h1>
      <main class="container">
         <div class="email-input-wrap">
          <input type="email" id="emailinput" placeholder="Entrez le mail souhaité...">
          <button type="button" id="analyzeBtn" class="eye-toggle" aria-label="Analyser l'email">🔍</button>
        </div>
        <button type="button" id="resetBtn" class="reset-button" aria-label="Réinitialiser">↻ Réinitialiser</button>
        <div id="resultsContainer" style="display: none;"></div>
      </main>
      <script src="../js/phishing.js"></script>
      <script>
        document.getElementById('analyzeBtn').addEventListener('click', function() {
          const emailInput = document.getElementById('emailinput').value.trim();
          const resultsContainer = document.getElementById('resultsContainer');
          
          if (!emailInput) {
            resultsContainer.textContent = 'Veuillez entrer une adresse email.';
            resultsContainer.style.display = 'block';
            resultsContainer.setAttribute('data-risk', 'warning');
            return;
          }

          const emailObject = {
            from: emailInput,
            subject: '',
            body: emailInput
          };

          const result = analyzeEmail(emailObject);
          
          let resultsHTML = `<h3>Score de détection: ${result.score}%</h3>`;
          resultsHTML += '<ul>';
          result.reasons.forEach(reason => {
            resultsHTML += `<li>${reason}</li>`;
          });
          resultsHTML += '</ul>';
          
          resultsContainer.innerHTML = resultsHTML;
          resultsContainer.style.display = 'block';
          
          let riskLevel = 'safe';
          if (result.score >= 70) {
            riskLevel = 'danger';
          } else if (result.score >= 40) {
            riskLevel = 'warning';
          }
          resultsContainer.setAttribute('data-risk', riskLevel);
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
          document.getElementById('emailinput').value = '';
          document.getElementById('resultsContainer').style.display = 'none';
          document.getElementById('resultsContainer').innerHTML = '';
          document.getElementById('emailinput').focus();
        });
      </script>
  </body>
</html>
