<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analyseur de mot de passe - CyberShield</title>
  <link rel="stylesheet" href="../style.css">
  </head>
  <body>
    <section class="topbar app-tabs-nav">
      <a class="topbar-button" href="../index.html">Dashboard</a>
      <a class="selected-topbar-button">Analyseur mot de passe</a>
      <a class="topbar-button" href="./phishing.html">Détecteur phishing</a>
      <a class="topbar-button" href="./cipher.html">Cryptographie messages</a>
      <a class="topbar-button" href="./quiz.html">Quiz interactif</a>
    </section>

    <h1>Analyseur de robustesse</h1>
    <main class="container">
      <div class="password-input-wrap">
        <input type="password" id="passwordInput" placeholder="Entrez votre mot de passe...">
        <button type="button" id="togglePassword" class="eye-toggle" aria-label="Afficher le mot de passe">👁</button>
      </div>
      <div class="score-bar">
        <div class="score-fill" id="scoreFill"></div>
      </div>
      <div class="criteres">Critères :
        <p>Longueur suffisante (8+ caractères)</p>
        <p>Majuscules présentes</p>
        <p>Chiffres présents</p>
        <p>Symboles présents</p>
        <p>Pas dans la liste noire</p>
      </div>
      <p>Score : <span id="scoreValue">0</span>/100</p>
    </main>
      <script src="../js/password.js"></script>
  </body>
</html>
