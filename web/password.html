<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analyseur de mot de passe — CyberShield</title>
  <link rel="stylesheet" href="../style.css">
  </head>
  <body>
      <section class="topbar">
          <button>Dashboard</button> <button>Analyseur mdp</button> <button>Phishing detector</button> <button>Quiz</button> <button>Cripto message</button>
      </section>
      <h1>Analyseur de mot de passe</h1>
      <main class="container">
        <div class="password-input-wrap">
          <input type="password" id="passwordInput" placeholder="Entrez votre mot de passe...">
          <button type="button" id="togglePassword" class="eye-toggle" aria-label="Afficher le mot de passe">👁</button>
        </div>
                <div class="score-bar">
                    <div class="score-fill" id="scoreFill"></div>
                </div>
                <div class = "criteres">Critères :
                    <p>Longueur suffisante (8+ caractères)</p>
                    <p>Majuscules présentes</p>
                    <p>Chiffres présents</p>
                    <p>Symboles présents</p>
                    <p>Pas dans la liste noire</p>
                </div>
                <p>Score : <span id="scoreValue">0</span>/100</p>
      </main>
      <h1>Chiffrement Cesar</h1>
      <main class="container">
        <section class="cipher-panel">
          <label class="cipher-label" for="caesarMessage">Saisir un message</label>
          <textarea id="caesarMessage" rows="4" class="cipher-input" placeholder="Tape ton message ici..."></textarea>

          <label class="cipher-label" for="caesarShift">Choisir un decalage (1-25)</label>
          <input id="caesarShift" type="number" min="1" max="25" value="3" class="cipher-number-input">

          <div class="cipher-actions">
            <button id="caesarEncryptBtn" type="button">Reveler le resultat chiffre</button>
          </div>

          <p class="cipher-label">Resultat chiffre</p>
          <pre id="caesarResult" class="cipher-result"></pre>
        </section>
      </main>
      <script src="../js/password.js"></script>
  </body>
</html>
