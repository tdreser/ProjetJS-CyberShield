<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analyseur de mot de passe — CyberShield</title>
  <link rel="stylesheet" href="../style.css">
  </head>
  <body>
      <section class="topbar">
          <button>Dashboard</button> <button>Analyseur mdp</button> <button>Phishing detector</button> <button>Quiz</button> <button>Cripto message</button>
      </section>
      <h1>Analyseur de mot de passe</h1>
      <main class="container">
        <input type="password" id="passwordInput" placeholder="Entrez votre mot de passe...">
                <div class="score-bar">
                    <div class="score-fill" id="scoreFill"></div>
                </div>
                <div class = "criteres">Critères :
                    <p>Longueur suffisante (8+ caractères)</p>
                    <p>Majuscules présentes</p>
                    <p>Chiffres présents</p>
                    <p>Symboles présents</p>
                    <p>Pas dans la liste noire</p>
                </div>
                <p>Score : <span id="scoreValue">0</span>/100</p>
      </main>
  </body>
</html>
