<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chiffrement Cesar - CyberShield</title>
  <link rel="stylesheet" href="../style.css">
  </head>
  <body>
      <section class="topbar">
          <a class="topbar-button" href="../index.html">Dashboard</a>
          <a class="topbar-button" href="./password.html">Analyseur mdp</a>
          <a class="topbar-button" href="./phishing.html">Détecteur phishing</a>
          <a class="selected-topbar-button">Cryptographie messages</a>
          <a class="topbar-button" href="./quiz.html">Quiz interactif</a>
      </section>
      <h1>Cryptographie des messages</h1>
      <main class="container">
        <section class="cipher-panel">
          <h3>Chiffrement Cesar</h3>

          <label class="cipher-label" for="caesarMessage">Message</label>
          <textarea id="caesarMessage" rows="4" class="cipher-input"></textarea>

          <label class="cipher-label" for="caesarShift">Decalage (1-25)</label>
          <input id="caesarShift" type="number" min="1" max="25" value="3" class="cipher-number-input">

          <div class="cipher-actions">
            <button id="caesarEncryptBtn" type="button">Chiffrer</button>
            <button id="caesarDecryptBtn" type="button">Dechiffrer</button>
            <button id="caesarBruteForceBtn" type="button">Force brute</button>
          </div>

          <p class="cipher-label">Resultat</p>
          <pre id="caesarResult" class="cipher-result"></pre>

          <h3>25 tentatives de dechiffrement</h3>
          <div class="cipher-table-wrap">
            <table class="cipher-table">
            <thead>
              <tr>
                <th>Decalage</th>
                <th>Texte</th>
              </tr>
            </thead>
            <tbody id="caesarBruteForceBody"></tbody>
          </table>
          </div>
        </section>
      </main>
      <script src="../js/cipher.js"></script>
  </body>
</html>
